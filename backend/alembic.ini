# Alembic configuration.
#
# The product has two SQLAlchemy metadatas: registry (one row per
# company) and per-company (accounts, journal entries, etc.). Each gets
# its own migration tree.
#
# Most of the time `ensure_registry_schema()` and `ensure_company_schema()`
# run migrations programmatically and bypass this file entirely. The CLI
# sections here exist so `alembic --name registry upgrade head` works
# for manual inspection / out-of-band schema work.

[alembic]
databases = registry, company

[registry]
script_location = %(here)s/alembic
# DB URL is set at runtime by env.py from app.config.Settings; this fallback
# only fires for `alembic --name registry -x ...` CLI invocations.
sqlalchemy.url = sqlite:///./registry.db

[company]
script_location = %(here)s/alembic_company
# DB URL is set at runtime; the `-x company=<id>` extra argument tells the
# env.py which company file to migrate.
sqlalchemy.url = sqlite:///./companies/placeholder.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
