# ShellCheck configuration
# Copy to project root as .shellcheckrc

# Use bash as default shell
shell=bash

# Enable all checks by default
# Never disable security-critical rules:
# - SC2086: Double quote to prevent globbing and word splitting
# - SC2091: Remove surrounding $() to avoid executing output

# Optional: Disable specific rules with justification
# disable=SC1090  # Can't follow non-constant source (if using dynamic sourcing)

# Enable external sources (for sourced files)
external-sources=true

# Severity level: error, warning, info, style
severity=style
