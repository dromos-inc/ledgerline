# markdownlint configuration
# Copy to project root as .markdownlint.yaml
---
# Default state for all rules
default: true

# MD003 - Heading style: ATX style (# Heading)
MD003:
  style: atx

# MD004 - Unordered list style: dash
MD004:
  style: dash

# MD007 - Unordered list indentation: 2 spaces
MD007:
  indent: 2

# MD009 - No trailing spaces (except for line breaks)
MD009:
  br_spaces: 2

# MD010 - No hard tabs
MD010: true

# MD012 - No multiple consecutive blank lines
MD012:
  maximum: 1

# MD013 - Line length
MD013:
  line_length: 120
  code_blocks: false
  tables: false
  headings: false

# MD022 - Headings should be surrounded by blank lines
MD022:
  lines_above: 1
  lines_below: 1

# MD024 - No duplicate headings (allow in different sections)
MD024:
  siblings_only: true

# MD025 - Single top-level heading
MD025: true

# MD026 - No trailing punctuation in headings
MD026:
  punctuation: ".,;:!"

# MD029 - Ordered list item prefix: ordered (1. 2. 3.)
MD029:
  style: ordered

# MD030 - Spaces after list markers
MD030:
  ul_single: 1
  ol_single: 1
  ul_multi: 1
  ol_multi: 1

# MD033 - Allow inline HTML (for things like <details>, <kbd>)
MD033:
  allowed_elements:
    - details
    - summary
    - kbd
    - br
    - sup
    - sub

# MD035 - Horizontal rule style
MD035:
  style: "---"

# MD041 - First line should be a top-level heading
MD041: true

# MD046 - Code block style: fenced
MD046:
  style: fenced

# MD048 - Code fence style: backtick
MD048:
  style: backtick

# MD049 - Emphasis style: asterisks
MD049:
  style: asterisk

# MD050 - Strong style: asterisks
MD050:
  style: asterisk
